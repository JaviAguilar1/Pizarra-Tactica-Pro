<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f5132">
<title>Pizarra Táctica Pro</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --verde:#2e7d46; --verde-osc:#1f5c33; --linea:rgba(255,255,255,.85);
  --panel:#14181c; --panel2:#1c2229; --borde:#2b333c; --txt:#e7ecef; --txt2:#9aa5ad;
  --azul:#1565c0; --rojo:#c62828; --acc:#f2b705; --acc2:#3aa0ff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--panel);
  color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
button{font-family:inherit;color:var(--txt);}
#rotar{display:none;position:fixed;inset:0;z-index:9999;background:var(--panel);
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
#rotar .ico{font-size:52px;margin-bottom:14px;animation:girar 2s ease-in-out infinite;}
@keyframes girar{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
#app{display:flex;flex-direction:column;height:100%;}

/* Barra superior */
#top{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--panel2);
  border-bottom:1px solid var(--borde);flex-wrap:nowrap;overflow-x:auto;}
#top .marca{font-weight:600;font-size:14px;white-space:nowrap;margin-right:4px;letter-spacing:.2px;}
.sel,.btn{background:var(--panel);border:1px solid var(--borde);border-radius:8px;
  padding:6px 9px;font-size:12px;cursor:pointer;white-space:nowrap;}
.btn:hover,.sel:hover{border-color:#3d4750;}
.btn.on{background:var(--acc);color:#1a1a1a;border-color:var(--acc);font-weight:600;}
.btn.prim{background:var(--acc2);color:#04233f;border-color:var(--acc2);font-weight:600;}
.grp{display:flex;align-items:center;gap:4px;padding:0 4px;border-left:1px solid var(--borde);}
.grp:first-of-type{border-left:none;}
label.mini{font-size:11px;color:var(--txt2);white-space:nowrap;}

/* Cuerpo */
#body{flex:1;display:flex;min-height:0;}
#tools{width:52px;background:var(--panel2);border-right:1px solid var(--borde);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;overflow-y:auto;}
.tool{width:40px;height:40px;border-radius:8px;background:var(--panel);border:1px solid var(--borde);
  display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex:0 0 auto;}
.tool.on{background:var(--acc);color:#1a1a1a;border-color:var(--acc);}
#stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  background:#0c0f12;min-width:0;overflow:hidden;}
#wrap{position:relative;}
#field{display:block;background:var(--verde);border-radius:6px;touch-action:none;}
#draw{position:absolute;inset:0;pointer-events:none;}

/* Banco */
#bench{width:78px;background:var(--panel2);border-left:1px solid var(--borde);
  display:flex;flex-direction:column;padding:6px 4px;overflow-y:auto;gap:6px;}
#bench .t{font-size:10px;color:var(--txt2);text-align:center;line-height:1.2;}
.benchrow{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}

/* Barra inferior de fotogramas */
#frames{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--panel2);
  border-top:1px solid var(--borde);overflow-x:auto;}
.fr{width:38px;height:38px;border-radius:7px;background:var(--panel);border:1px solid var(--borde);
  display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex:0 0 auto;position:relative;}
.fr.on{border-color:var(--acc);background:var(--acc);color:#1a1a1a;font-weight:600;}
.fr .x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;
  background:var(--rojo);color:#fff;font-size:11px;line-height:16px;text-align:center;display:none;}
.fr.on .x{display:block;}
.play{width:40px;height:40px;border-radius:50%;background:var(--acc2);color:#04233f;border:none;
  font-size:16px;cursor:pointer;flex:0 0 auto;font-weight:700;}
.rnd{width:34px;height:34px;border-radius:50%;background:var(--panel);border:1px solid var(--borde);
  cursor:pointer;flex:0 0 auto;font-size:13px;}

/* Modales */
.modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);
  align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.card{background:var(--panel2);border:1px solid var(--borde);border-radius:14px;
  padding:18px;max-width:420px;width:100%;max-height:86vh;overflow-y:auto;}
.card h3{margin:0 0 12px;font-size:16px;font-weight:600;}
.card .row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.inp{flex:1;background:var(--panel);border:1px solid var(--borde);border-radius:8px;
  padding:9px;font-size:13px;color:var(--txt);width:100%;}
textarea.inp{resize:vertical;min-height:64px;}
.list{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
.item{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--borde);
  border-radius:8px;padding:9px;font-size:13px;}
.item .nm{flex:1;cursor:pointer;}
.item .del{color:var(--rojo);cursor:pointer;font-size:15px;padding:2px 6px;}
.cardbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid #fff;cursor:pointer;flex:0 0 auto;}
.swatch.sel{outline:2px solid var(--acc);outline-offset:2px;}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:900;
  background:#000c;border:1px solid var(--borde);border-radius:10px;padding:9px 16px;
  font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;}
#toast.show{opacity:1;}
.hint{font-size:11px;color:var(--txt2);margin:4px 0 0;}
</style>
</head>
<body>

<div id="rotar"><div class="ico">📱</div><div style="font-size:16px;font-weight:600">Girá el teléfono</div>
<div style="color:var(--txt2);margin-top:6px;font-size:13px">La pizarra se usa en horizontal</div></div>

<div id="app">
  <div id="top">
    <span class="marca">Pizarra Táctica Pro</span>
    <div class="grp">
      <select class="sel" id="espacio" title="Espacio de trabajo"></select>
      <button class="btn" id="renombrar" title="Renombrar espacio">✎</button>
    </div>
    <div class="grp">
      <select class="sel" id="cancha">
        <option value="f11">F11 completa</option>
        <option value="f11m">F11 medio</option>
        <option value="f11v">F11 vertical</option>
        <option value="f5">F5 completa</option>
        <option value="f5m">F5 medio</option>
        <option value="f5v">F5 vertical</option>
      </select>
      <select class="sel" id="formacion"></select>
    </div>
    <div class="grp">
      <label class="mini">Local</label>
      <select class="sel" id="nLocal"></select>
      <label class="mini">Visita</label>
      <select class="sel" id="nVisita"></select>
    </div>
    <div class="grp">
      <button class="btn" id="colLocal" title="Color local">🔵</button>
      <button class="btn" id="colVisita" title="Color visita">🔴</button>
    </div>
    <div class="grp">
      <button class="btn prim" id="guardar">Guardar</button>
      <button class="btn" id="abrir">Abrir</button>
    </div>
  </div>

  <div id="body">
    <div id="tools">
      <div class="tool on" data-tool="mover" title="Mover fichas">✋</div>
      <div class="tool" data-tool="pase" title="Flecha de pase">➤</div>
      <div class="tool" data-tool="mov" title="Movimiento (discontinua)">⇢</div>
      <div class="tool" data-tool="linea" title="Línea libre">✎</div>
      <div class="tool" data-tool="zona" title="Zona">▢</div>
      <div class="tool" data-tool="texto" title="Texto">T</div>
      <div class="tool" data-tool="balon" title="Poner balón">⚽</div>
      <div class="tool" data-tool="borrar" title="Borrar dibujos">🧽</div>
    </div>

    <div id="stage">
      <div id="wrap">
        <canvas id="field"></canvas>
        <canvas id="draw"></canvas>
      </div>
    </div>

    <div id="bench">
      <div class="t">Suplentes<br>local</div>
      <div class="benchrow" id="benchLocal"></div>
      <div class="t">Suplentes<br>visita</div>
      <div class="benchrow" id="benchVisita"></div>
    </div>
  </div>

  <div id="frames">
    <button class="play" id="play" title="Reproducir">▶</button>
    <button class="rnd" id="prev" title="Anterior">◀</button>
    <button class="rnd" id="next" title="Siguiente">▶</button>
    <div style="display:flex;gap:6px;align-items:center" id="frameList"></div>
    <button class="rnd" id="addFrame" title="Capturar fotograma">+</button>
    <label class="mini" style="margin-left:auto">Velocidad</label>
    <input type="range" id="vel" min="300" max="2000" value="900" step="100" style="width:90px">
    <button class="btn" id="nota" title="Nota de la jugada">📝</button>
  </div>
</div>

<!-- Modal guardar -->
<div class="modal" id="mGuardar"><div class="card">
  <h3>Guardar jugada</h3>
  <div class="row"><input class="inp" id="gNombre" placeholder="Nombre de la jugada"></div>
  <textarea class="inp" id="gNota" placeholder="Nota / objetivo (opcional)"></textarea>
  <p class="hint">Se guarda en el espacio actual. No pisa las jugadas anteriores.</p>
  <div class="cardbtns">
    <button class="btn" onclick="cerrar('mGuardar')">Cancelar</button>
    <button class="btn prim" id="gConfirmar">Guardar</button>
  </div>
</div></div>

<!-- Modal abrir -->
<div class="modal" id="mAbrir"><div class="card">
  <h3>Jugadas guardadas</h3>
  <div class="list" id="listaJugadas"><p class="hint">Cargando…</p></div>
  <div class="cardbtns"><button class="btn" onclick="cerrar('mAbrir')">Cerrar</button></div>
</div></div>

<!-- Modal renombrar espacio -->
<div class="modal" id="mEspacio"><div class="card">
  <h3>Renombrar espacio</h3>
  <div class="row"><input class="inp" id="eNombre" placeholder="Nombre del espacio"></div>
  <div class="cardbtns">
    <button class="btn" onclick="cerrar('mEspacio')">Cancelar</button>
    <button class="btn prim" id="eConfirmar">Guardar</button>
  </div>
</div></div>

<!-- Modal color -->
<div class="modal" id="mColor"><div class="card">
  <h3>Elegir color</h3>
  <div class="row" id="swatches" style="flex-wrap:wrap"></div>
  <div class="cardbtns"><button class="btn" onclick="cerrar('mColor')">Cerrar</button></div>
</div></div>

<!-- Modal nota -->
<div class="modal" id="mNota"><div class="card">
  <h3>Nota de la jugada</h3>
  <textarea class="inp" id="notaTxt" placeholder="Escribí el objetivo, indicaciones, a qué apunta…"></textarea>
  <div class="cardbtns"><button class="btn prim" onclick="guardarNotaLocal()">Listo</button></div>
</div></div>

<!-- Modal texto -->
<div class="modal" id="mTexto"><div class="card">
  <h3>Agregar texto</h3>
  <div class="row"><input class="inp" id="txtInp" placeholder="Texto"></div>
  <div class="cardbtns">
    <button class="btn" onclick="cerrar('mTexto')">Cancelar</button>
    <button class="btn prim" id="txtOk">Agregar</button>
  </div>
</div></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ====== Firebase ====== */
const firebaseConfig = {
  apiKey: "AIzaSyBD6-SZfxKPxWGqhdFhKInDBYtKfyFsa64",
  authDomain: "pizarra-tactia-pro.firebaseapp.com",
  databaseURL: "https://pizarra-tactia-pro-default-rtdb.firebaseio.com",
  projectId: "pizarra-tactia-pro",
  storageBucket: "pizarra-tactia-pro.firebasestorage.app",
  messagingSenderId: "611988775110",
  appId: "1:611988775110:web:3938b2347bdf3378c277c7"
};
firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
window.fbDB = fbDB;

/* ====== Estado ====== */
const COLORES = ["#1565c0","#c62828","#2e7d32","#f9a825","#6a1b9a","#00838f","#333333","#e91e63","#ff6f00","#ffffff"];
const state = {
  espacioId:"esp1",
  espacios:{},
  cancha:"f11",
  colLocal:"#1565c0",
  colVisita:"#c62828",
  players:[],      // fichas en cancha {id,eq,num,nombre,x,y}
  bench:[],        // suplentes {id,eq,num,nombre}
  ball:null,       // {x,y}
  frames:[],       // cada frame: {players:[{id,x,y}], ball:{x,y}}
  frameActual:0,
  drawings:[],     // {tipo,pts/x,y,texto,color}
  nota:""
};

const FORMACIONES = {
  11:{"4-4-2":[[10,50],[25,20],[25,40],[25,60],[25,80],[50,20],[50,40],[50,60],[50,80],[72,38],[72,62]],
      "4-3-3":[[10,50],[25,20],[25,40],[25,60],[25,80],[48,30],[48,50],[48,70],[72,25],[72,50],[72,75]],
      "4-2-3-1":[[10,50],[25,20],[25,40],[25,60],[25,80],[42,38],[42,62],[60,25],[60,50],[60,75],[78,50]],
      "3-5-2":[[10,50],[26,30],[26,50],[26,70],[48,15],[48,35],[48,50],[48,65],[48,85],[72,40],[72,60]],
      "Libre":null},
  5:{"1-2-1":[[12,50],[40,30],[40,70],[68,50]],
     "2-2":[[14,35],[14,65],[60,35],[60,65]],
     "1-1-2":[[12,50],[42,50],[68,32],[68,68]],
     "Libre":null}
};

/* ====== Canvas / campo ====== */
const stage=document.getElementById("stage"), wrap=document.getElementById("wrap");
const field=document.getElementById("field"), fctx=field.getContext("2d");
const draw=document.getElementById("draw"), dctx=draw.getContext("2d");
let W=0,H=0;

function tipoCancha(){
  const c=state.cancha;
  const vert=c.endsWith("v");
  const medio=c.endsWith("m");
  const f5=c.startsWith("f5");
  return {vert,medio,f5};
}
function dimStage(){
  const pad=10;
  const availW=stage.clientWidth-pad*2, availH=stage.clientHeight-pad*2;
  const {vert,medio,f5}=tipoCancha();
  let ratio; // ancho/alto
  if(vert){ ratio = medio ? (f5?0.9:0.74) : (f5?0.62:0.66); }
  else { ratio = medio ? (f5?1.35:1.5) : (f5?1.6:1.54); }
  let w=availW, h=w/ratio;
  if(h>availH){ h=availH; w=h*ratio; }
  W=Math.round(w); H=Math.round(h);
  [field,draw].forEach(cv=>{cv.width=W;cv.height=H;cv.style.width=W+"px";cv.style.height=H+"px";});
  wrap.style.width=W+"px"; wrap.style.height=H+"px";
}

function drawField(){
  const {vert,medio,f5}=tipoCancha();
  fctx.clearRect(0,0,W,H);
  // césped con franjas
  const bands=8;
  for(let i=0;i<bands;i++){
    fctx.fillStyle = i%2 ? "#2e7d46" : "#2a723f";
    if(vert) fctx.fillRect(0,i*H/bands,W,H/bands);
    else fctx.fillRect(i*W/bands,0,W/bands,H);
  }
  fctx.strokeStyle="rgba(255,255,255,.85)"; fctx.lineWidth=2; fctx.fillStyle="rgba(255,255,255,.85)";
  const m=Math.max(8,Math.min(W,H)*0.03);
  fctx.strokeRect(m,m,W-2*m,H-2*m);

  const cx=W/2, cy=H/2;
  // linea de mitad + circulo central (segun orientacion y si es medio campo)
  const r=Math.min(W,H)*(f5?0.12:0.13);
  if(vert){
    if(!medio){ fctx.beginPath();fctx.moveTo(m,cy);fctx.lineTo(W-m,cy);fctx.stroke();
      fctx.beginPath();fctx.arc(cx,cy,r,0,7);fctx.stroke(); }
    else { fctx.beginPath();fctx.moveTo(m,H-m);fctx.lineTo(W-m,H-m);fctx.stroke();
      fctx.beginPath();fctx.arc(cx,H-m,r,Math.PI,2*Math.PI);fctx.stroke(); }
  } else {
    if(!medio){ fctx.beginPath();fctx.moveTo(cx,m);fctx.lineTo(cx,H-m);fctx.stroke();
      fctx.beginPath();fctx.arc(cx,cy,r,0,7);fctx.stroke(); }
    else { fctx.beginPath();fctx.moveTo(W-m,m);fctx.lineTo(W-m,H-m);fctx.stroke();
      fctx.beginPath();fctx.arc(W-m,cy,r,0.5*Math.PI,1.5*Math.PI);fctx.stroke(); }
  }
  fctx.beginPath();fctx.arc(vert?cx:(medio?W-m:cx), vert?(medio?H-m:cy):cy, 3,0,7);fctx.fill();

  // áreas
  drawAreas(m,f5,vert,medio);
}

function arcCorner(x,y,q){ // q: cuadrante hacia el campo
  const rr=Math.min(W,H)*0.025;
  fctx.beginPath();
  const a={tl:[0,0.5],tr:[0.5,1],br:[1,1.5],bl:[1.5,2]}[q];
  fctx.arc(x,y,rr,a[0]*Math.PI,a[1]*Math.PI);fctx.stroke();
}
function drawAreas(m,f5,vert,medio){
  const arco=(cxSide)=>{ // dibuja area en un lado horizontal
    const bigW=W*(f5?0.10:0.16), bigH=H*(f5?0.55:0.60);
    const smW=W*(f5?0.045:0.07), smH=H*(f5?0.34:0.30);
    const yBig=(H-bigH)/2, ySm=(H-smH)/2;
    if(cxSide==="L"){
      if(f5){ // F5: solo un area redondeada
        fctx.beginPath();fctx.moveTo(m,yBig);
        fctx.lineTo(m+bigW*0.6,yBig);
        fctx.arc(m,H/2,bigH/2,-0.5*Math.PI,0.5*Math.PI);
        fctx.lineTo(m,yBig+bigH);fctx.stroke();
      } else {
        fctx.strokeRect(m,yBig,bigW,bigH);
        fctx.strokeRect(m,ySm,smW,smH);
        // punto penal + arco
        const px=m+bigW*0.66;
        fctx.beginPath();fctx.arc(px,H/2,3,0,7);fctx.fill();
        fctx.beginPath();fctx.arc(m+bigW,H/2,bigH*0.28,-0.42*Math.PI,0.42*Math.PI);fctx.stroke();
      }
      // arco
      fctx.strokeRect(m-6,H/2-smH*0.2,6,smH*0.4);
    } else {
      if(f5){
        fctx.beginPath();fctx.moveTo(W-m,yBig);
        fctx.lineTo(W-m-bigW*0.6,yBig);
        fctx.arc(W-m,H/2,bigH/2,0.5*Math.PI,1.5*Math.PI);
        fctx.lineTo(W-m,yBig+bigH);fctx.stroke();
      } else {
        fctx.strokeRect(W-m-bigW,yBig,bigW,bigH);
        fctx.strokeRect(W-m-smW,ySm,smW,smH);
        const px=W-m-bigW*0.66;
        fctx.beginPath();fctx.arc(px,H/2,3,0,7);fctx.fill();
        fctx.beginPath();fctx.arc(W-m-bigW,H/2,bigH*0.28,0.58*Math.PI,1.42*Math.PI);fctx.stroke();
      }
      fctx.strokeRect(W-m,H/2-smH*0.2,6,smH*0.4);
    }
  };
  const arcoV=(side)=>{ // area vertical (arriba/abajo)
    const bigW=W*(f5?0.55:0.60), bigH=H*(f5?0.10:0.16);
    const smW=W*(f5?0.34:0.30), smH=H*(f5?0.045:0.07);
    const xBig=(W-bigW)/2, xSm=(W-smW)/2;
    if(side==="T"){
      if(f5){ fctx.beginPath();fctx.moveTo(xBig,m);fctx.lineTo(xBig,m+bigH*0.6);
        fctx.arc(W/2,m,bigW/2,Math.PI,2*Math.PI);fctx.lineTo(xBig+bigW,m);fctx.stroke(); }
      else { fctx.strokeRect(xBig,m,bigW,bigH); fctx.strokeRect(xSm,m,smW,smH);
        const py=m+bigH*0.66; fctx.beginPath();fctx.arc(W/2,py,3,0,7);fctx.fill();
        fctx.beginPath();fctx.arc(W/2,m+bigH,bigW*0.28,0.08*Math.PI,0.92*Math.PI);fctx.stroke(); }
      fctx.strokeRect(W/2-smW*0.2,m-6,smW*0.4,6);
    } else {
      if(f5){ fctx.beginPath();fctx.moveTo(xBig,H-m);fctx.lineTo(xBig,H-m-bigH*0.6);
        fctx.arc(W/2,H-m,bigW/2,0,Math.PI);fctx.lineTo(xBig+bigW,H-m);fctx.stroke(); }
      else { fctx.strokeRect(xBig,H-m-bigH,bigW,bigH); fctx.strokeRect(xSm,H-m-smH,smW,smH);
        const py=H-m-bigH*0.66; fctx.beginPath();fctx.arc(W/2,py,3,0,7);fctx.fill();
        fctx.beginPath();fctx.arc(W/2,H-m-bigH,bigW*0.28,1.08*Math.PI,1.92*Math.PI);fctx.stroke(); }
      fctx.strokeRect(W/2-smW*0.2,H-m,smW*0.4,6);
    }
  };

  if(vert){
    if(!medio){ arcoV("T"); arcoV("B"); }
    else { arcoV("T"); }
    // corners
    arcCorner(m,m,"tl");arcCorner(W-m,m,"tr");
    if(!medio){arcCorner(W-m,H-m,"br");arcCorner(m,H-m,"bl");}
  } else {
    if(!medio){ arco("L"); arco("R"); arcCorner(m,m,"tl");arcCorner(W-m,m,"tr");
      arcCorner(W-m,H-m,"br");arcCorner(m,H-m,"bl"); }
    else { arco("R"); arcCorner(W-m,m,"tr");arcCorner(W-m,H-m,"br"); }
  }
}

/* ====== Fichas ====== */
const R=()=>Math.max(11,Math.min(W,H)*0.028);
function drawPlayers(){
  dctx.clearRect(0,0,W,H);
  redrawDrawings();
  const r=R();
  state.players.forEach(p=>{
    dctx.beginPath();dctx.arc(p.x,p.y,r,0,7);
    dctx.fillStyle=p.eq==="L"?state.colLocal:state.colVisita;
    dctx.fill();dctx.lineWidth=2;dctx.strokeStyle="#fff";dctx.stroke();
    dctx.fillStyle=(p.eq==="L"?state.colLocal:state.colVisita)==="#ffffff"?"#000":"#fff";
    dctx.font=`bold ${Math.round(r*0.95)}px system-ui`;dctx.textAlign="center";dctx.textBaseline="middle";
    dctx.fillText(p.num,p.x,p.y);
    if(p.nombre){dctx.fillStyle="#fff";dctx.font=`${Math.round(r*0.7)}px system-ui`;
      dctx.fillText(p.nombre,p.x,p.y+r+Math.round(r*0.6));}
  });
  if(state.ball){
    dctx.beginPath();dctx.arc(state.ball.x,state.ball.y,r*0.55,0,7);
    dctx.fillStyle="#fff";dctx.fill();dctx.lineWidth=1.5;dctx.strokeStyle="#111";dctx.stroke();
    dctx.fillStyle="#111";dctx.font=`${Math.round(r*0.6)}px system-ui`;dctx.fillText("⚽",state.ball.x,state.ball.y);
  }
}
function redrawDrawings(){
  state.drawings.forEach(d=>{
    dctx.strokeStyle=d.color||"#f2b705";dctx.fillStyle=d.color||"#f2b705";dctx.lineWidth=2.5;
    if(d.tipo==="pase"||d.tipo==="mov"){
      dctx.setLineDash(d.tipo==="mov"?[8,6]:[]);
      dctx.beginPath();dctx.moveTo(d.x1,d.y1);dctx.lineTo(d.x2,d.y2);dctx.stroke();
      const ang=Math.atan2(d.y2-d.y1,d.x2-d.x1),ah=10;
      dctx.beginPath();dctx.moveTo(d.x2,d.y2);
      dctx.lineTo(d.x2-ah*Math.cos(ang-0.4),d.y2-ah*Math.sin(ang-0.4));
      dctx.lineTo(d.x2-ah*Math.cos(ang+0.4),d.y2-ah*Math.sin(ang+0.4));
      dctx.closePath();dctx.fill();dctx.setLineDash([]);
    } else if(d.tipo==="linea"){
      dctx.setLineDash([]);dctx.beginPath();
      d.pts.forEach((pt,i)=>i?dctx.lineTo(pt[0],pt[1]):dctx.moveTo(pt[0],pt[1]));dctx.stroke();
    } else if(d.tipo==="zona"){
      dctx.setLineDash([6,4]);dctx.globalAlpha=.25;
      dctx.fillRect(d.x1,d.y1,d.x2-d.x1,d.y2-d.y1);dctx.globalAlpha=1;
      dctx.strokeRect(d.x1,d.y1,d.x2-d.x1,d.y2-d.y1);dctx.setLineDash([]);
    } else if(d.tipo==="texto"){
      dctx.setLineDash([]);dctx.font="bold 15px system-ui";dctx.textAlign="left";
      dctx.fillText(d.texto,d.x,d.y);
    }
  });
}

/* ====== Interacción ====== */
let tool="mover", dragP=null, drawing=null, offX=0, offY=0;
function evPos(e){
  const r=draw.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height)};
}
function hitPlayer(x,y){
  const r=R();
  for(let i=state.players.length-1;i>=0;i--){
    const p=state.players[i];
    if(Math.hypot(p.x-x,p.y-y)<=r+2) return p;
  }
  if(state.ball && Math.hypot(state.ball.x-x,state.ball.y-y)<=r*0.6) return state.ball;
  return null;
}
function pointerDown(e){
  e.preventDefault();
  const {x,y}=evPos(e);
  if(tool==="mover"){
    const p=hitPlayer(x,y);
    if(p){dragP=p;offX=x-p.x;offY=y-p.y;}
  } else if(tool==="balon"){
    state.ball={x,y};drawPlayers();syncFrameActual();
  } else if(tool==="borrar"){
    for(let i=state.drawings.length-1;i>=0;i--){
      const d=state.drawings[i];
      if(cercaDe(d,x,y)){state.drawings.splice(i,1);break;}
    }
    drawPlayers();
  } else if(tool==="texto"){
    pendTxt={x,y};abrir("mTexto");document.getElementById("txtInp").value="";
  } else if(tool==="pase"||tool==="mov"){
    drawing={tipo:tool,x1:x,y1:y,x2:x,y2:y,color:"#f2b705"};
  } else if(tool==="linea"){
    drawing={tipo:"linea",pts:[[x,y]],color:"#f2b705"};
  } else if(tool==="zona"){
    drawing={tipo:"zona",x1:x,y1:y,x2:x,y2:y,color:"#f2b705"};
  }
}
function pointerMove(e){
  if(!dragP&&!drawing)return;
  e.preventDefault();
  const {x,y}=evPos(e);
  if(dragP){dragP.x=x-offX;dragP.y=y-offY;drawPlayers();}
  else if(drawing){
    if(drawing.tipo==="linea")drawing.pts.push([x,y]);
    else{drawing.x2=x;drawing.y2=y;}
    drawPlayers();drawTemp(drawing);
  }
}
function drawTemp(d){
  dctx.strokeStyle=d.color;dctx.fillStyle=d.color;dctx.lineWidth=2.5;
  if(d.tipo==="pase"||d.tipo==="mov"){
    dctx.setLineDash(d.tipo==="mov"?[8,6]:[]);
    dctx.beginPath();dctx.moveTo(d.x1,d.y1);dctx.lineTo(d.x2,d.y2);dctx.stroke();dctx.setLineDash([]);
  } else if(d.tipo==="linea"){
    dctx.beginPath();d.pts.forEach((p,i)=>i?dctx.lineTo(p[0],p[1]):dctx.moveTo(p[0],p[1]));dctx.stroke();
  } else if(d.tipo==="zona"){
    dctx.setLineDash([6,4]);dctx.strokeRect(d.x1,d.y1,d.x2-d.x1,d.y2-d.y1);dctx.setLineDash([]);
  }
}
function pointerUp(e){
  if(dragP){dragP=null;syncFrameActual();}
  if(drawing){
    if(drawing.tipo==="linea"&&drawing.pts.length<2){drawing=null;drawPlayers();return;}
    state.drawings.push(drawing);drawing=null;drawPlayers();
  }
}
function cercaDe(d,x,y){
  if(d.tipo==="texto")return Math.hypot(d.x-x,d.y-y)<30;
  if(d.tipo==="zona")return x>=Math.min(d.x1,d.x2)&&x<=Math.max(d.x1,d.x2)&&y>=Math.min(d.y1,d.y2)&&y<=Math.max(d.y1,d.y2);
  if(d.tipo==="linea")return d.pts.some(p=>Math.hypot(p[0]-x,p[1]-y)<14);
  const dist=distPuntoSeg(x,y,d.x1,d.y1,d.x2,d.y2);return dist<14;
}
function distPuntoSeg(px,py,x1,y1,x2,y2){
  const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;const dot=A*C+B*D,len=C*C+D*D;
  let t=len?dot/len:0;t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*C),py-(y1+t*D));
}
[draw].forEach(cv=>{
  cv.style.pointerEvents="auto";
  cv.addEventListener("mousedown",pointerDown);cv.addEventListener("mousemove",pointerMove);
  window.addEventListener("mouseup",pointerUp);
  cv.addEventListener("touchstart",pointerDown,{passive:false});
  cv.addEventListener("touchmove",pointerMove,{passive:false});
  cv.addEventListener("touchend",pointerUp);
});

function cargarFormaciones(){
  const f5=state.cancha.startsWith("f5");
  const set=FORMACIONES[f5?5:11];
  const sel=document.getElementById("formacion");sel.innerHTML="";
  Object.keys(set).forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=k;sel.appendChild(o);});
}
function cargarCantidades(){
  const f5=state.cancha.startsWith("f5");
  const max=f5?7:16, def=f5?5:11;
  ["nLocal","nVisita"].forEach(id=>{
    const s=document.getElementById(id);const prev=s.value;s.innerHTML="";
    for(let i=1;i<=max;i++){const o=document.createElement("option");o.value=i;o.textContent=i;s.appendChild(o);}
    s.value=prev&&prev<=max?prev:def;
  });
}
function posicionar(){
  const f5=state.cancha.startsWith("f5");
  const form=document.getElementById("formacion").value;
  const nL=+document.getElementById("nLocal").value, nV=+document.getElementById("nVisita").value;
  const base=FORMACIONES[f5?5:11][form];
  state.players=[];state.bench=[];state.ball=null;
  const cupoL = base?Math.min(nL,base.length):nL;
  const cupoV = base?Math.min(nV,base.length):nV;
  armaEquipo(cupoL,nL,"L");armaEquipo(cupoV,nV,"V");
  drawPlayers();renderBench();nuevaAnim();
}
function armaEquipo(cupo,total,lado){
  const f5=state.cancha.startsWith("f5");
  const form=document.getElementById("formacion").value;
  const base=FORMACIONES[f5?5:11][form];
  const {vert}=tipoCancha();
  const mapXY=(fx,fy)=>{
    let px=fx/100, py=fy/100;
    if(lado==="V") px=1-px;
    if(vert) return {x:py*W, y:px*H};
    return {x:px*W, y:py*H};
  };
  for(let i=0;i<total;i++){
    if(i<cupo){
      let fx,fy;
      if(base&&base[i]){fx=base[i][0];fy=base[i][1];}
      else{fx=12+(i%5)*18; fy=15+Math.floor(i/5)*20;}
      const pos=mapXY(fx,fy);
      state.players.push({id:uid(),eq:lado,num:i+1,nombre:"",x:pos.x,y:pos.y});
    } else {
      state.bench.push({id:uid(),eq:lado,num:i+1,nombre:""});
    }
  }
}
function renderBench(){
  ["L","V"].forEach(lado=>{
    const cont=document.getElementById(lado==="L"?"benchLocal":"benchVisita");
    cont.innerHTML="";
    state.bench.filter(b=>b.eq===lado).forEach(b=>{
      const el=document.createElement("div");
      el.style.cssText=`width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
        justify-content:center;font-size:12px;font-weight:600;cursor:grab;color:#fff;
        background:${lado==="L"?state.colLocal:state.colVisita};border:2px solid #fff;`;
      el.textContent=b.num;
      el.title="Arrastrá a la cancha";
      el.addEventListener("mousedown",e=>benchDown(e,b));
      el.addEventListener("touchstart",e=>benchDown(e,b),{passive:false});
      cont.appendChild(el);
    });
  });
}
let benchDrag=null;
function benchDown(e,b){
  e.preventDefault();benchDrag=b;
  window.addEventListener("mousemove",benchMove);window.addEventListener("mouseup",benchUp);
  window.addEventListener("touchmove",benchMove,{passive:false});window.addEventListener("touchend",benchUp);
}
function benchMove(e){if(!benchDrag)return;e.preventDefault();}
function benchUp(e){
  if(!benchDrag)return;
  const t=e.changedTouches?e.changedTouches[0]:e;
  const r=draw.getBoundingClientRect();
  if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
    const x=(t.clientX-r.left)*(W/r.width), y=(t.clientY-r.top)*(H/r.height);
    state.players.push({id:benchDrag.id,eq:benchDrag.eq,num:benchDrag.num,nombre:benchDrag.nombre,x,y});
    state.bench=state.bench.filter(b=>b.id!==benchDrag.id);
    drawPlayers();renderBench();syncFrameActual();
  }
  benchDrag=null;
  window.removeEventListener("mousemove",benchMove);window.removeEventListener("mouseup",benchUp);
  window.removeEventListener("touchmove",benchMove);window.removeEventListener("touchend",benchUp);
}

/* ====== Animación por fotogramas ====== */
function snapshot(){
  return {players:state.players.map(p=>({id:p.id,x:p.x,y:p.y})),
          ball:state.ball?{x:state.ball.x,y:state.ball.y}:null};
}
function nuevaAnim(){
  state.frames=[snapshot()];state.frameActual=0;renderFrames();
}
function syncFrameActual(){
  if(state.frames[state.frameActual])state.frames[state.frameActual]=snapshot();
}
function renderFrames(){
  const cont=document.getElementById("frameList");cont.innerHTML="";
  state.frames.forEach((f,i)=>{
    const el=document.createElement("div");el.className="fr"+(i===state.frameActual?" on":"");
    el.textContent="F"+(i+1);
    el.onclick=()=>irFrame(i);
    if(state.frames.length>1){const x=document.createElement("div");x.className="x";x.textContent="×";
      x.onclick=(ev)=>{ev.stopPropagation();borrarFrame(i);};el.appendChild(x);}
    cont.appendChild(el);
  });
}
function irFrame(i){
  aplicarFrame(state.frames[i]);state.frameActual=i;renderFrames();
}
function aplicarFrame(f){
  f.players.forEach(fp=>{const p=state.players.find(pp=>pp.id===fp.id);if(p){p.x=fp.x;p.y=fp.y;}});
  state.ball=f.ball?{x:f.ball.x,y:f.ball.y}:null;drawPlayers();
}
function capturarFrame(){
  syncFrameActual();
  state.frames.splice(state.frameActual+1,0,snapshot());
  state.frameActual++;renderFrames();toast("Fotograma "+(state.frameActual+1)+" capturado");
}
function borrarFrame(i){
  if(state.frames.length<=1)return;
  state.frames.splice(i,1);
  if(state.frameActual>=state.frames.length)state.frameActual=state.frames.length-1;
  irFrame(state.frameActual);
}
let playing=false;
function reproducir(){
  if(playing){playing=false;document.getElementById("play").textContent="▶";return;}
  if(state.frames.length<2){toast("Necesitás al menos 2 fotogramas");return;}
  playing=true;document.getElementById("play").textContent="⏸";
  const vel=+document.getElementById("vel").value;
  let idx=0;aplicarFrame(state.frames[0]);
  const paso=()=>{
    if(!playing)return;
    if(idx>=state.frames.length-1){playing=false;document.getElementById("play").textContent="▶";return;}
    animarEntre(state.frames[idx],state.frames[idx+1],vel,()=>{idx++;paso();});
  };
  paso();
}
function animarEntre(a,b,dur,cb){
  const ini=performance.now();
  const step=(t)=>{
    if(!playing){cb&&cb();return;}
    let k=Math.min(1,(t-ini)/dur);
    b.players.forEach(bp=>{
      const ap=a.players.find(x=>x.id===bp.id);const p=state.players.find(x=>x.id===bp.id);
      if(p&&ap){p.x=ap.x+(bp.x-ap.x)*k;p.y=ap.y+(bp.y-ap.y)*k;}
    });
    if(b.ball&&a.ball&&state.ball){state.ball.x=a.ball.x+(b.ball.x-a.ball.x)*k;state.ball.y=a.ball.y+(b.ball.y-a.ball.y)*k;}
    drawPlayers();
    if(k<1)requestAnimationFrame(step);else cb&&cb();
  };
  requestAnimationFrame(step);
}

    players:state.players,bench:state.bench,frames:state.frames,drawings:state.drawings,
    ts:Date.now()};
  fbDB.ref("espacios/"+state.espacioId+"/jugadas").push(data)
    .then(()=>{cerrar("mGuardar");toast("Jugada guardada");})
    .catch(err=>toast("Error al guardar"));

function listarJugadas(){
  const cont=document.getElementById("listaJugadas");cont.innerHTML="<p class='hint'>Cargando…</p>";

      it.appendChild(nm);it.appendChild(del);cont.appendChild(it);
    });

function chequearOrientacion(){
  const esMovil=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const vertical=window.innerHeight>window.innerWidth;
  document.getElementById("rotar").style.display=(esMovil&&vertical)?"flex":"none";
}

/* ====== Init ====== */
function init(){
  cargarEspacios();cargarFormaciones();cargarCantidades();
  dimStage();drawField();posicionar();chequearOrientacion();
}
window.addEventListener("resize",()=>{dimStage();drawField();aplicarFrame(state.frames[state.frameActual]||snapshot());chequearOrientacion();});
window.addEventListener("orientationchange",()=>setTimeout(()=>{dimStage();drawField();chequearOrientacion();},300));
window.addEventListener("load",init);
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
